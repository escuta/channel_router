<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580" font-family="'Courier New', monospace">

  <!-- Background -->
  <rect width="900" height="580" fill="#f5f0e8"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="52" fill="#1a1a1a"/>
  <text x="450" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#f0e8cc" letter-spacing="2">CHANNEL ROUTER</text>
  <text x="450" y="42" text-anchor="middle" font-size="10" fill="#aaa" letter-spacing="1">Passive 3-position signal router · 2P3T rotary switch · 2× 1kΩ · 4 RCA</text>

  <!-- Ground bus -->
  <line x1="40" y1="520" x2="860" y2="520" stroke="#208040" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="536" text-anchor="middle" font-size="9" fill="#208040">GREEN GROUND BUS — all RCA sleeves + 1kΩ bottom legs bonded here</text>

  <!-- ══ INPUT RCAs ══ -->
  <text x="100" y="82" text-anchor="middle" font-size="10" fill="#555">INPUTS</text>

  <!-- L IN -->
  <rect x="40" y="90" width="76" height="44" rx="5" fill="#d0ebd0" stroke="#3a7a3a" stroke-width="1.5"/>
  <text x="78" y="109" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4a1a">L IN</text>
  <text x="78" y="126" text-anchor="middle" font-size="9" fill="#3a7a3a">← preamp L</text>
  <line x1="78" y1="134" x2="78" y2="520" stroke="#208040" stroke-width="1.2"/>

  <!-- R IN -->
  <rect x="40" y="290" width="76" height="44" rx="5" fill="#ebd0d0" stroke="#7a3a3a" stroke-width="1.5"/>
  <text x="78" y="309" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a1a1a">R IN</text>
  <text x="78" y="326" text-anchor="middle" font-size="9" fill="#7a3a3a">← preamp R</text>
  <line x1="78" y1="334" x2="78" y2="520" stroke="#208040" stroke-width="1.2"/>

  <!-- L IN hot → COM1 -->
  <line x1="116" y1="112" x2="340" y2="112" stroke="#2060c0" stroke-width="2.2"/>

  <!-- R IN hot → COM2 -->
  <line x1="116" y1="312" x2="340" y2="312" stroke="#c02020" stroke-width="2.2"/>

  <!-- ══ 2P3T SWITCH ══ -->
  <rect x="320" y="62" width="280" height="430" rx="8" fill="#e8e2d4" stroke="#555" stroke-width="2"/>
  <text x="460" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">2P3T ROTARY SWITCH</text>
  <text x="460" y="100" text-anchor="middle" font-size="9" fill="#666">(pole 3 unused)</text>

  <!-- Shaft -->
  <circle cx="460" cy="270" r="24" fill="#555" stroke="#333" stroke-width="1.5"/>
  <circle cx="460" cy="270" r="9" fill="#bbb"/>
  <text x="460" y="258" text-anchor="middle" font-size="8" fill="#fff">L · C · R</text>

  <!-- ── POLE 1 Left channel ── -->
  <text x="400" y="128" text-anchor="middle" font-size="9" font-weight="bold" fill="#2060c0">POLE 1 — LEFT</text>

  <!-- COM1 -->
  <circle cx="340" cy="145" r="6" fill="#2060c0"/>
  <text x="328" y="143" text-anchor="end" font-size="9" fill="#2060c0" font-weight="bold">COM1</text>
  <line x1="340" y1="112" x2="340" y2="145" stroke="#2060c0" stroke-width="2.2"/>

  <!-- Pole 1 Left throw → L OUT hot -->
  <circle cx="580" cy="120" r="5" fill="#2060c0"/>
  <line x1="346" y1="145" x2="575" y2="122" stroke="#2060c0" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="588" y="118" font-size="9" fill="#2060c0">T1 left → L OUT</text>

  <!-- Pole 1 Centre throw → L OUT hot -->
  <circle cx="580" cy="148" r="5" fill="#2060c0"/>
  <line x1="346" y1="145" x2="575" y2="148" stroke="#2060c0" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="588" y="146" font-size="9" fill="#2060c0">T2 centre → L OUT</text>

  <!-- Pole 1 Right throw → GND via 1kΩ -->
  <circle cx="580" cy="176" r="5" fill="#208040"/>
  <line x1="346" y1="145" x2="575" y2="174" stroke="#208040" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="588" y="174" font-size="9" fill="#208040">T3 right → 1kΩ → GND</text>

  <!-- ── POLE 2 Right channel ── -->
  <text x="400" y="328" text-anchor="middle" font-size="9" font-weight="bold" fill="#c02020">POLE 2 — RIGHT</text>

  <!-- COM2 -->
  <circle cx="340" cy="345" r="6" fill="#c02020"/>
  <text x="328" y="343" text-anchor="end" font-size="9" fill="#c02020" font-weight="bold">COM2</text>
  <line x1="340" y1="312" x2="340" y2="345" stroke="#c02020" stroke-width="2.2"/>

  <!-- Pole 2 Left throw → GND via 1kΩ -->
  <circle cx="580" cy="320" r="5" fill="#208040"/>
  <line x1="346" y1="345" x2="575" y2="322" stroke="#208040" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="588" y="318" font-size="9" fill="#208040">T1 left → 1kΩ → GND</text>

  <!-- Pole 2 Centre throw → R OUT hot -->
  <circle cx="580" cy="348" r="5" fill="#c02020"/>
  <line x1="346" y1="345" x2="575" y2="348" stroke="#c02020" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="588" y="346" font-size="9" fill="#c02020">T2 centre → R OUT</text>

  <!-- Pole 2 Right throw → R OUT hot -->
  <circle cx="580" cy="376" r="5" fill="#c02020"/>
  <line x1="346" y1="345" x2="575" y2="374" stroke="#c02020" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="588" y="374" font-size="9" fill="#c02020">T3 right → R OUT</text>

  <!-- ── POLE 3 unused ── -->
  <text x="460" y="450" text-anchor="middle" font-size="9" fill="#aaa">POLE 3 — all pins unconnected</text>

  <!-- Position labels -->
  <text x="365" y="494" text-anchor="middle" font-size="9" font-weight="bold" fill="#2060c0">POS 1</text>
  <text x="365" y="506" text-anchor="middle" font-size="8" fill="#555">left only</text>
  <text x="460" y="494" text-anchor="middle" font-size="9" font-weight="bold" fill="#444">POS 2</text>
  <text x="460" y="506" text-anchor="middle" font-size="8" fill="#555">stereo</text>
  <text x="555" y="494" text-anchor="middle" font-size="9" font-weight="bold" fill="#c02020">POS 3</text>
  <text x="555" y="506" text-anchor="middle" font-size="8" fill="#555">right only</text>

  <!-- ══ OUTPUT RCAs ══ -->
  <text x="820" y="82" text-anchor="middle" font-size="10" fill="#555">OUTPUTS</text>

  <!-- Wires from throws to output hots -->
  <!-- L OUT: T1 and T2 both join at x=720 y=134 -->
  <line x1="585" y1="120" x2="720" y2="120" stroke="#2060c0" stroke-width="2"/>
  <line x1="585" y1="148" x2="720" y2="148" stroke="#2060c0" stroke-width="2"/>
  <line x1="720" y1="120" x2="720" y2="148" stroke="#2060c0" stroke-width="1.5"/>
  <line x1="720" y1="134" x2="784" y2="134" stroke="#2060c0" stroke-width="2.2"/>
  <circle cx="720" cy="134" r="4" fill="#2060c0"/>

  <!-- R OUT: T2 and T3 both join at x=720 y=362 -->
  <line x1="585" y1="348" x2="720" y2="348" stroke="#c02020" stroke-width="2"/>
  <line x1="585" y1="376" x2="720" y2="376" stroke="#c02020" stroke-width="2"/>
  <line x1="720" y1="348" x2="720" y2="376" stroke="#c02020" stroke-width="1.5"/>
  <line x1="720" y1="362" x2="784" y2="362" stroke="#c02020" stroke-width="2.2"/>
  <circle cx="720" cy="362" r="4" fill="#c02020"/>

  <!-- 1kΩ resistor on Pole 1 right throw (L OUT grounded in pos 3) -->
  <line x1="585" y1="176" x2="640" y2="176" stroke="#208040" stroke-width="1.5"/>
  <rect x="640" y="168" width="14" height="28" rx="2" fill="#f5f0e8" stroke="#208040" stroke-width="1.2"/>
  <text x="647" y="179" text-anchor="middle" font-size="7" fill="#208040">1kΩ</text>
  <line x1="654" y1="176" x2="654" y2="520" stroke="#208040" stroke-width="1.3"/>
  <circle cx="654" cy="520" r="3" fill="#208040"/>

  <!-- 1kΩ resistor on Pole 2 left throw (R OUT grounded in pos 1) -->
  <line x1="585" y1="320" x2="666" y2="320" stroke="#208040" stroke-width="1.5"/>
  <rect x="666" y="312" width="14" height="28" rx="2" fill="#f5f0e8" stroke="#208040" stroke-width="1.2"/>
  <text x="673" y="323" text-anchor="middle" font-size="7" fill="#208040">1kΩ</text>
  <line x1="680" y1="320" x2="680" y2="520" stroke="#208040" stroke-width="1.3"/>
  <circle cx="680" cy="520" r="3" fill="#208040"/>

  <!-- L OUT socket -->
  <rect x="784" y="112" width="76" height="44" rx="5" fill="#d0ebd0" stroke="#3a7a3a" stroke-width="1.5"/>
  <text x="822" y="131" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4a1a">L OUT</text>
  <text x="822" y="148" text-anchor="middle" font-size="9" fill="#3a7a3a">→ left amp</text>
  <line x1="822" y1="156" x2="822" y2="520" stroke="#208040" stroke-width="1.2"/>

  <!-- R OUT socket -->
  <rect x="784" y="340" width="76" height="44" rx="5" fill="#ebd0d0" stroke="#7a3a3a" stroke-width="1.5"/>
  <text x="822" y="359" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a1a1a">R OUT</text>
  <text x="822" y="376" text-anchor="middle" font-size="9" fill="#7a3a3a">→ right amp</text>
  <line x1="822" y1="384" x2="822" y2="520" stroke="#208040" stroke-width="1.2"/>

  <!-- Note box -->
  <rect x="40" y="548" width="820" height="24" rx="4" fill="#e0d8c8" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="564" text-anchor="middle" font-size="9" fill="#444">Test at RCA sockets not at switch pins · Insulate RCA socket bodies from enclosure · Blue = L hot · Red = R hot · Green = ground</text>

</svg>
