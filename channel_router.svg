<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'Courier New', monospace">

  <!-- Background -->
  <rect width="900" height="620" fill="#f5f0e8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">CHANNEL ROUTER</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#555">Passive 3-position signal router — preamplifier outputs to power amplifier inputs</text>
  <line x1="40" y1="68" x2="860" y2="68" stroke="#999" stroke-width="1"/>

  <!-- Enclosure outline -->
  <rect x="20" y="78" width="860" height="300" rx="8" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="36" y="94" font-size="10" fill="#aaa">ENCLOSURE</text>

  <!-- ======== INPUTS ======== -->
  <text x="80" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">INPUTS</text>
  <text x="80" y="122" text-anchor="middle" font-size="11" fill="#666">(from preamp)</text>

  <!-- Left Input RCA -->
  <rect x="30" y="132" width="60" height="36" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="60" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">L IN</text>
  <text x="60" y="164" text-anchor="middle" font-size="10" fill="#2e7d32">RCA</text>

  <!-- Right Input RCA -->
  <rect x="30" y="210" width="60" height="36" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="1.5"/>
  <text x="60" y="230" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">R IN</text>
  <text x="60" y="242" text-anchor="middle" font-size="10" fill="#c62828">RCA</text>

  <!-- ======== INPUT LINES ======== -->
  <!-- Left hot -->
  <line x1="90" y1="150" x2="200" y2="150" stroke="#388e3c" stroke-width="2"/>
  <!-- Left ground -->
  <line x1="90" y1="162" x2="130" y2="162" stroke="#888" stroke-width="1.5"/>
  <line x1="130" y1="162" x2="130" y2="545" stroke="#888" stroke-width="1.5"/>
  <!-- Right hot -->
  <line x1="90" y1="228" x2="165" y2="228" stroke="#c62828" stroke-width="2"/>
  <line x1="165" y1="228" x2="165" y2="272" stroke="#c62828" stroke-width="2"/>
  <!-- Right ground -->
  <line x1="90" y1="240" x2="140" y2="240" stroke="#888" stroke-width="1.5"/>
  <line x1="140" y1="240" x2="140" y2="545" stroke="#888" stroke-width="1.5"/>

  <!-- ======== 1P3T ROTARY SWITCH ======== -->
  <circle cx="380" cy="228" r="82" fill="#e8e0d0" stroke="#555" stroke-width="2"/>
  <circle cx="380" cy="228" r="12" fill="#555"/>
  <text x="380" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">1P3T ROTARY SWITCH</text>
  <text x="380" y="330" text-anchor="middle" font-size="10" fill="#555">1 pole, 3 throw</text>

  <!-- Position labels -->
  <text x="268" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">POS 1</text>
  <text x="268" y="203" text-anchor="middle" font-size="10" fill="#333">LEFT</text>
  <text x="380" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">POS 2</text>
  <text x="380" y="165" text-anchor="middle" font-size="10" fill="#333">BOTH</text>
  <text x="492" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">POS 3</text>
  <text x="492" y="203" text-anchor="middle" font-size="10" fill="#333">RIGHT</text>

  <!-- Switch wiper from left input -->
  <line x1="200" y1="150" x2="300" y2="228" stroke="#388e3c" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Right input to switch pos3 -->
  <line x1="165" y1="272" x2="300" y2="272" stroke="#c62828" stroke-width="2"/>
  <line x1="300" y1="272" x2="380" y2="228" stroke="#c62828" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Pos2 stereo connection -->
  <line x1="380" y1="228" x2="380" y2="185" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ======== OUTPUTS ======== -->
  <text x="820" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">OUTPUTS</text>
  <text x="820" y="122" text-anchor="middle" font-size="11" fill="#666">(to power amps)</text>

  <!-- Left Output RCA -->
  <rect x="810" y="132" width="60" height="36" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="840" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">L OUT</text>
  <text x="840" y="164" text-anchor="middle" font-size="10" fill="#2e7d32">RCA</text>

  <!-- Right Output RCA -->
  <rect x="810" y="210" width="60" height="36" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="1.5"/>
  <text x="840" y="230" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">R OUT</text>
  <text x="840" y="242" text-anchor="middle" font-size="10" fill="#c62828">RCA</text>

  <!-- Output lines from switch -->
  <line x1="460" y1="150" x2="810" y2="150" stroke="#388e3c" stroke-width="2"/>
  <line x1="460" y1="228" x2="810" y2="228" stroke="#c62828" stroke-width="2"/>
  <line x1="460" y1="150" x2="380" y2="185" stroke="#555" stroke-width="1.5"/>

  <!-- Output grounds -->
  <line x1="810" y1="162" x2="750" y2="162" stroke="#888" stroke-width="1.5"/>
  <line x1="750" y1="162" x2="750" y2="545" stroke="#888" stroke-width="1.5"/>
  <line x1="810" y1="240" x2="760" y2="240" stroke="#888" stroke-width="1.5"/>
  <line x1="760" y1="240" x2="760" y2="545" stroke="#888" stroke-width="1.5"/>

  <!-- ======== GROUNDING RESISTORS ======== -->
  <!-- R1 — grounds right output in pos 1 -->
  <rect x="580" y="280" width="50" height="18" rx="2" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5"/>
  <text x="605" y="293" text-anchor="middle" font-size="10" fill="#e65100">100Ω</text>
  <text x="605" y="276" text-anchor="middle" font-size="9" fill="#777">R1</text>
  <line x1="580" y1="289" x2="555" y2="289" stroke="#f57f17" stroke-width="1.5"/>
  <line x1="555" y1="289" x2="555" y2="228" stroke="#f57f17" stroke-width="1.5"/>
  <circle cx="555" cy="228" r="3" fill="#f57f17"/>
  <line x1="630" y1="289" x2="660" y2="289" stroke="#f57f17" stroke-width="1.5"/>
  <line x1="660" y1="289" x2="660" y2="545" stroke="#f57f17" stroke-width="1.5"/>

  <!-- R2 — grounds left output in pos 3 -->
  <rect x="580" y="320" width="50" height="18" rx="2" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5"/>
  <text x="605" y="333" text-anchor="middle" font-size="10" fill="#e65100">100Ω</text>
  <text x="605" y="316" text-anchor="middle" font-size="9" fill="#777">R2</text>
  <line x1="580" y1="329" x2="540" y2="329" stroke="#f57f17" stroke-width="1.5"/>
  <line x1="540" y1="329" x2="540" y2="150" stroke="#f57f17" stroke-width="1.5"/>
  <circle cx="540" cy="150" r="3" fill="#f57f17"/>
  <line x1="630" y1="329" x2="670" y2="329" stroke="#f57f17" stroke-width="1.5"/>
  <line x1="670" y1="329" x2="670" y2="545" stroke="#f57f17" stroke-width="1.5"/>

  <!-- ======== GROUND BUS ======== -->
  <line x1="130" y1="545" x2="760" y2="545" stroke="#888" stroke-width="2"/>
  <text x="445" y="563" text-anchor="middle" font-size="11" fill="#555">COMMON GROUND BUS (RCA shields)</text>

  <!-- ======== POSITION TABLE ======== -->
  <rect x="40" y="578" width="820" height="32" rx="4" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="160" y="578" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">POS 1 — LEFT:</text>
  <text x="280" y="578" text-anchor="middle" font-size="10" fill="#333">Left signal → L OUT. R OUT grounded via R1.</text>
  <text x="160" y="592" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">POS 2 — BOTH:</text>
  <text x="280" y="592" text-anchor="middle" font-size="10" fill="#333">L → L OUT, R → R OUT. Normal stereo.</text>
  <text x="160" y="606" text-anchor="middle" font-size="10" font-weight="bold" fill="#b71c1c">POS 3 — RIGHT:</text>
  <text x="280" y="606" text-anchor="middle" font-size="10" fill="#333">Right signal → R OUT. L OUT grounded via R2.</text>

</svg>
